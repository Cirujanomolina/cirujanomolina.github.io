</head>
<body>

    <header class="header-banner">
        <div class="header-logo-box">
            <img src="https://uyzywbvbftlvegpzyzvy.supabase.co/storage/v1/object/public/Logos/Dr.%20Juan%20Santiago%20Molina%20logo-11%20big.png" alt="Símbolo Dr. Molina">
        </div>
        <div class="banner-title">
            gestión de pacientes
        </div>
    </header>

    <main class="container">
        
        <div class="stats">
            <div class="stat-card">
                <h3>Total Registros</h3>
                <p id="count-total">Cargando...</p>
            </div>
            <div class="stat-card">
                <h3>Hoy</h3>
                <p id="count-today">Cargando...</p>
            </div>
        </div>

        <div class="search-container">
            <input type="text" id="searchInput" class="search-input" placeholder="Omnibuscador: Escribe nombre, ciudad, email o cédula..." onkeyup="filterTable()">
        </div>

        <div class="table-wrapper">
            <div id="loading-message">Conectando con la base de datos de Supabase...</div>
            <div id="error-message"></div>
            <table id="patientTable" style="display: none;">
                <thead>
                    <tr>
                        <th>Fecha</th>
                        <th>Nombre Completo</th>
                        <th>Ciudad</th>
                        <th>Email / Teléfono</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <!-- Los datos se cargarán aquí -->
                </tbody>
            </table>
        </div>
    </main>

    <footer class="footer">
        <div class="footer-logo-crop">
            <img src="https://uyzywbvbftlvegpzyzvy.supabase.co/storage/v1/object/public/Logos/Dr.%20Juan%20Santiago%20Molina%20logo%20(1)-09.png" alt="Dr. Juan Santiago Molina">
        </div>
        <div class="footer-tagline">
            Humanidad, ciencia y acompañamiento real
        </div>
    </footer>

    <script>
        // ==========================================
        // TUS CREDENCIALES DE SUPABASE YA INYECTADAS
        // ==========================================
        const SUPA_URL = "https://uyzywbvbftlvegpzyzvy.supabase.co"; 
        const SUPA_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV5enl3YnZiZnRsdmVncHp5enZ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5NDg3MjIsImV4cCI6MjA5MzUyNDcyMn0.sTvVxvOt7NmZ3t-kGhngIbtjl3pWSj5t1S7KVEx6Xlk"; 
        
        const TABLE_NAME = "Preconsulta_Bariatrica";

        async function fetchPatients() {
            const loadingMsg = document.getElementById('loading-message');
            const errorMsg = document.getElementById('error-message');
            const table = document.getElementById('patientTable');

            try {
                const response = await fetch(`${SUPA_URL}/rest/v1/${TABLE_NAME}?select=*&order=created_at.desc`, {
                    headers: {
                        'apikey': SUPA_KEY,
                        'Authorization': 'Bearer ' + SUPA_KEY
                    }
                });
                
                if (!response.ok) {
                    throw new Error('Error en la respuesta de red: ' + response.status);
                }

                const data = await response.json();
                
                loadingMsg.style.display = 'none';
                table.style.display = 'table';
                
                renderTable(data);
                updateStats(data);
            } catch (error) {
                console.error('Error cargando pacientes:', error);
                loadingMsg.style.display = 'none';
                errorMsg.style.display = 'block';
                errorMsg.innerHTML = 'Hubo un error al cargar los datos. Por favor, revisa la consola para más detalles.';
                document.getElementById('count-total').textContent = 'Error';
                document.getElementById('count-today').textContent = 'Error';
            }
        }

        function renderTable(patients) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';

            if (patients.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:30px;">No hay pacientes registrados aún en Supabase.</td></tr>';
                return;
            }

            patients.forEach(p => {
                const row = document.createElement('tr');
                const dateObj = new Date(p.created_at);
                const date = dateObj.toLocaleDateString('es-CO', { day: '2-digit', month: '2-digit', year: 'numeric' });
                
                row.innerHTML = `
                    <td>${date}</td>
                    <td style="font-weight: 600; color: var(--teal);">${p.nombre_completo || 'Sin nombre'}</td>
                    <td>${p.ciudad || 'N/A'}</td>
                    <td>
                        <span style="opacity: 0.9;">${p.email || 'N/A'}</span><br>
                        <span style="font-size: 11px; opacity: 0.6;">${p.telefono || ''}</span>
                    </td>
                    <td>
                        <a href="visualizador_paciente.html?id=${p.id}" class="btn-view" target="_blank">Ver Ficha</a>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        function updateStats(data) {
            document.getElementById('count-total').textContent = data.length;
            const todayStr = new Date().toISOString().split('T')[0];
            const todayCount = data.filter(p => p.created_at.startsWith(todayStr)).length;
            document.getElementById('count-today').textContent = todayCount;
        }

        function filterTable() {
            const input = document.getElementById("searchInput");
            const filter = input.value.toUpperCase();
            const table = document.getElementById("patientTable");
            const tr = table.getElementsByTagName("tr");

            for (let i = 1; i < tr.length; i++) {
                const td = tr[i].getElementsByTagName("td");
                let textContent = "";
                for(let j = 0; j < td.length; j++) {
                    if (td[j]) {
                        textContent += td[j].textContent || td[j].innerText + " ";
                    }
                }
                if (textContent.toUpperCase().indexOf(filter) > -1) {
                    tr[i].style.display = "";
                } else {
                    tr[i].style.display = "none";
                }
            }
        }

        // Ejecutar al cargar la página
        fetchPatients();
    </script>
</body>
